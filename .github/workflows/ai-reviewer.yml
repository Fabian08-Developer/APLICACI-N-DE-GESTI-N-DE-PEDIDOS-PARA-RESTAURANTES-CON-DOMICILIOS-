name: Auditor de Codigo - Estilo Reporte Profesional

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
      - master

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auditoria de Codigo con Gemini Pro
        uses: google-github-actions/run-gemini-pro-action@v1
        with:
          api_key: ${{ secrets.AI_API_KEY }}
          model: "gemini-1.5-pro-latest"
          prompt: |
            Actúa como un Arquitecto de Software Senior y Auditor de Ciberseguridad. Tu tarea es generar un "Informe de revisión profesional" clonando exactamente la estructura, el tono clínico-técnico y la profundidad analítica del documento de referencia.

            Analiza los cambios de código introducidos en este commit correspondientes a la aplicación Laravel 13 / Livewire 4 de gestión de pedidos para restaurantes con domicilios en Neiva.

            Debes estructurar tu respuesta usando OBLIGATORIAMENTE los siguientes títulos y pautas exactas:

            # INFORME DE REVISIÓN PROFESIONAL

            ## INFORMACIÓN GENERAL
            - **Repositorio revisado**: Fabian08-Developer/APLICACI-N-DE-GESTI-N-DE-PEDIDOS-PARA-RESTAURANTES-CON-DOMICILIOS-
            - **Tecnologías principales**: (Identifica si los cambios afectan a PHP 8.3, Laravel 13, Livewire 4, Sanctum, Reverb, Spatie, Predis, etc.)
            - **Estructura general**: (Evalúa cómo se posiciona el cambio dentro de la estructura de carpetas cafeteria-app/cafeteria-app)

            ## ARQUITECTURA Y ESTRUCTURA DE CÓDIGO
            - **Archivo composer.json**: (Analiza si hay cambios en dependencias o scripts)
            - **Configuración de entorno**: (Evalúa si se modifican archivos .env.example, variables de PostgreSQL, drivers de Redis, o exposición de credenciales)
            - **Rutas y lógica de negocio (web.php)**: (Audita si el código añade rutas masivas, closures innecesarios, o rompe la división por roles)
            - **Modelos y autenticación**: (Monitorea cambios en el Modelo User, contrasena, SoftDeletes, HasUuid o la granularidad con spatie/laravel-permission)
            - **Controladores destacados**: (Analiza si los cambios añaden complejidad en componentes como ZonaCoberturaController o ClienteController)

            ## FORTALEZAS
            (Lista detalladamente los puntos fuertes observados en el diff basándote en: Arquitectura sólida, Validaciones, Seguridad, Soporte multitenant, Automatización o Roles)

            ## PROBLEMAS DETECTADOS Y OPORTUNIDADES DE MEJORA
            (Busca problemas del tipo: Gestión de roles ambigua, Sobrecarga de rutas, Desactivación de verificaciones como isSucursalOpen, Complejidad en controladores, Gestión insegura de tokens, Ausencia de pruebas o falta de transacciones en operaciones críticas)

            ## RECOMENDACIONES
            (Proporciona soluciones directas: Adoptar permisos robustos con Spatie, Refactorizar rutas, Separar lógica en servicios, Activar verificaciones o Revisar seguridad de tokens)

            ## CONCLUSIÓN
            (Cierra con un párrafo corporativo de alto nivel técnico evaluando la escalabilidad, mantenibilidad y seguridad del sistema tras estos cambios)

      - name: Guardar Reporte como Archivo Descargable
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Informe-Revision-Profesional
          path: |
            *.md
            *.txt
