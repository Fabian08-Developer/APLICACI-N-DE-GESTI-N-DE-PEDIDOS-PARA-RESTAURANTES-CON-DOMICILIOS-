version: "3.9"

services:

  app:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile

    container_name: sgpd-app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ../:/var/www

    depends_on:
      - postgres
      - redis

    networks:
      - sgpd

  nginx:

    image: nginx:latest

    container_name: sgpd-nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ../:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - sgpd

  postgres:

    image: postgres:17

    container_name: sgpd-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: sgpd
      POSTGRES_USER: sgpd
      POSTGRES_PASSWORD: password

    volumes:
      - postgres:/var/lib/postgresql/data

    networks:
      - sgpd

  redis:

    image: redis:7

    container_name: sgpd-redis

    restart: unless-stopped

    networks:
      - sgpd

volumes:

  postgres:

networks:

  sgpd: